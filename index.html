<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nell Music - Ultra Final</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <style>
        :root {
            --accent: #ff2d55;
            --glass: rgba(255, 255, 255, 0.12);
            --blur: blur(35px) saturate(180%);
            --border: 1px solid rgba(255, 255, 255, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: linear-gradient(135deg, #d1d1d6 0%, #ffffff 100%);
            background-attachment: fixed;
            color: #1c1c1e; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; 
            padding-bottom: 260px; 
            min-height: 100vh;
        }

        .container { padding: 15px; max-width: 800px; margin: 0 auto; }

        /* Hyper Glass Design */
        .search-box, .card, .player-wrapper, .bottom-nav, .modal-content {
            background: var(--glass) !important;
            backdrop-filter: var(--blur) !important;
            -webkit-backdrop-filter: var(--blur) !important;
            border: var(--border) !important;
        }

        .search-box { padding: 14px; border-radius: 18px; display: flex; align-items: center; gap: 10px; margin-bottom: 25px; }
        .search-box input { border: none; outline: none; background: transparent; width: 100%; font-size: 16px; color: #000; }

        .card { padding: 12px; border-radius: 26px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
        .thumb-box { width: 100%; aspect-ratio: 1/1; border-radius: 20px; overflow: hidden; margin-bottom: 12px; cursor: pointer; }
        .thumb-box img { width: 100%; height: 100%; object-fit: cover; }

        /* Player Controls */
        .player-wrapper {
            position: fixed; bottom: 105px; left: 15px; right: 15px;
            border-radius: 35px; padding: 20px; z-index: 1000;
            display: none; box-shadow: 0 15px 45px rgba(0,0,0,0.1);
        }
        #pFill { height: 100%; background: var(--accent); width: 0%; transition: width 0.1s linear; border-radius: 0 5px 5px 0; }

        /* iOS Alert Styling - Authentication Look */
        .ios-alert-container .swal2-popup {
            background: rgba(255, 255, 255, 0.4) !important;
            backdrop-filter: blur(45px) saturate(200%) !important;
            -webkit-backdrop-filter: blur(45px) saturate(200%) !important;
            border-radius: 22px !important;
            border: 1px solid rgba(255, 255, 255, 0.4) !important;
            width: 280px !important;
            padding: 0 !important;
            overflow: hidden;
        }
        .ios-alert-container .swal2-title { font-size: 18px !important; font-weight: 700 !important; padding: 25px 20px 10px !important; }
        .ios-alert-container .swal2-html-container { font-size: 13px !important; margin: 0 20px 15px !important; color: #444; }
        .ios-alert-container .swal2-input { 
            background: rgba(255, 255, 255, 0.5) !important; 
            border: 0.5px solid rgba(0,0,0,0.1) !important;
            border-radius: 10px !important; font-size: 15px !important; height: 35px !important; 
            margin: 10px 20px 20px !important; width: auto !important;
        }
        .ios-alert-container .swal2-actions { display: flex !important; border-top: 0.5px solid rgba(0,0,0,0.1) !important; width: 100% !important; margin: 0 !important; }
        .ios-alert-container .swal2-confirm, .ios-alert-container .swal2-cancel {
            flex: 1 !important; background: transparent !important; height: 50px !important; 
            margin: 0 !important; font-size: 17px !important; border: none !important;
        }
        .ios-alert-container .swal2-confirm { color: #007aff !important; font-weight: 600 !important; }
        .ios-alert-container .swal2-cancel { color: #ff3b30 !important; border-right: 0.5px solid rgba(0,0,0,0.1) !important; }

        /* Navigation */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; display: flex; justify-content: space-around; padding: 15px 0 35px; z-index: 1001; }
        .nav-item { text-align: center; color: rgba(0,0,0,0.4); font-size: 11px; font-weight: 600; cursor: pointer; }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 24px; display: block; margin-bottom: 5px; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.2); display: none; z-index: 2000; align-items: flex-end; }
        .modal-content { width: 100%; padding: 30px; border-radius: 35px 35px 0 0; }
    </style>
</head>
<body>

    <div class="container">
        <header style="display: flex; justify-content: space-between; align-items: center; padding: 25px 5px;">
            <h1 style="font-size: 34px; font-weight: 900; letter-spacing: -1.8px;">Nell<span style="color:var(--accent)">Music</span></h1>
            <div style="background: var(--glass); padding: 6px 15px; border-radius: 25px; backdrop-filter: blur(10px); font-size: 10px; font-weight: 800; border: var(--border);">PRO STUDIO</div>
        </header>

        <div class="swiper banner-container" id="mainSwiper" style="border-radius: 30px; overflow: hidden; height: 210px; margin-bottom: 30px;">
            <div class="swiper-wrapper" id="bannerWrapper"></div>
        </div>

        <div class="search-box">
            <i class="fas fa-search" style="color:rgba(0,0,0,0.3)"></i>
            <input type="text" id="searchInput" placeholder="Search music...">
        </div>

        <div class="grid-music" id="musicGrid" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px;"></div>
    </div>

    <div class="player-wrapper" id="miniPlayer">
        <div id="pSeek" style="width: 100%; height: 5px; background: rgba(0,0,0,0.05); position: absolute; top: 0; left: 0; cursor: pointer;">
            <div id="pFill"></div>
        </div>
        
        <div style="display: flex; justify-content: space-between; margin: 8px 0 12px;">
            <span id="upNextInfo" style="font-size: 9px; color: var(--accent); font-weight: 800; text-transform: uppercase;">NEXT: -</span>
            <span style="font-size: 10px; opacity: 0.6;"><span id="currTime">0:00</span> / <span id="durTime">0:00</span></span>
        </div>
        
        <div style="display: flex; align-items: center; gap: 15px;">
            <img src="" id="pCover" style="width: 55px; height: 55px; border-radius: 16px; object-fit: cover;">
            <div style="flex: 1; min-width: 0;">
                <div id="pTitle" style="font-size: 16px; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">-</div>
                <p id="pArtist" style="font-size: 12px; opacity: 0.6;"></p>
            </div>
            <i class="fas fa-cloud-download-alt" id="pDownloadBtn" style="color: var(--accent); font-size: 26px; cursor: pointer;"></i>
        </div>

        <div style="display: flex; align-items: center; justify-content: space-between; margin-top: 18px;">
            <i class="fas fa-random" id="btnShuffle" style="color: rgba(0,0,0,0.2); cursor: pointer;"></i>
            <div style="display:flex; align-items:center; gap:25px;">
                <i class="fas fa-backward" onclick="window.playPrev()" style="font-size:20px; cursor:pointer;"></i>
                <div id="btnPlayPause" style="width: 50px; height: 50px; border-radius: 50%; background: var(--accent); color: white; display: grid; place-items: center; font-size: 20px; box-shadow: 0 10px 25px rgba(255,45,85,0.3);">
                    <i class="fas fa-play"></i>
                </div>
                <i class="fas fa-forward" onclick="window.playNext()" style="font-size:20px; cursor:pointer;"></i>
            </div>
            <i class="fas fa-redo" id="btnRepeat" style="color: rgba(0,0,0,0.2); cursor: pointer;"></i>
        </div>

        <div style="display: flex; align-items: center; gap: 12px; margin-top: 18px; opacity: 0.4;">
            <i class="fas fa-volume-off"></i>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="1" style="flex:1; accent-color: var(--accent);">
            <i class="fas fa-volume-up"></i>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active"><i class="fas fa-house"></i>Home</div>
        <div onclick="window.checkPass('upload')" class="nav-item"><i class="fas fa-plus-circle"></i>Studio</div>
        <div class="nav-item" onclick="Swal.fire({title:'Library', text:'Segera Hadir', customClass:{container:'ios-alert-container'}, buttonsStyling:false, confirmButtonText:'OK'})"><i class="fas fa-heart"></i>Liked</div>
    </nav>

    <div id="adminModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle" style="margin-bottom: 25px; font-weight: 900; font-size: 22px;">Upload Studio</h3>
            <form id="uploadForm">
                <input type="text" id="songTitle" placeholder="Judul Lagu" required style="width:100%; padding:15px; background:rgba(255,255,255,0.2); border:none; border-radius:12px; margin-bottom:10px; outline:none;">
                <input type="text" id="songArtist" placeholder="Nama Artis" required style="width:100%; padding:15px; background:rgba(255,255,255,0.2); border:none; border-radius:12px; margin-bottom:10px; outline:none;">
                <input type="text" id="ytLink" placeholder="Link YouTube (Auto-Thumbnail)" style="width:100%; padding:15px; background:rgba(255,255,255,0.2); border:none; border-radius:12px; margin-bottom:10px; outline:none;">
                <input type="text" id="manualThumb" placeholder="Atau Link Gambar Manual" style="width:100%; padding:15px; background:rgba(255,255,255,0.2); border:none; border-radius:12px; margin-bottom:15px; outline:none;">
                <input type="file" id="songFile" style="display:none;">
                <label for="songFile" id="fileLabel" style="display:block; padding:18px; border:2px dashed var(--accent); border-radius:15px; text-align:center; color: var(--accent); font-weight: 800; margin-bottom: 20px;">AMBIL AUDIO (.mp3)</label>
                <button type="submit" id="btnUpload" style="width:100%; padding:18px; background:var(--accent); color:white; border:none; border-radius:15px; font-weight:900;">SIMPAN PERUBAHAN</button>
                <button type="button" onclick="window.toggleAdmin()" style="width:100%; margin-top:15px; background:none; border:none; color:rgba(0,0,0,0.4); font-weight:600;">Tutup</button>
            </form>
        </div>
    </div>

    <audio id="mainAudio"></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, update, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDQbPGVmUN95ALjvKrPAeND_Vi09r9lPcs",
            authDomain: "webb-online.firebaseapp.com",
            databaseURL: "https://webb-online-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "webb-online",
            storageBucket: "webb-online.firebasestorage.app",
            messagingSenderId: "639981237091",
            appId: "1:639981237091:web:0b1fcb20b44848e9cdd956"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const musicRef = ref(database, 'songs');
        const audio = document.getElementById('mainAudio');
        
        window.musicList = [];
        let currentIdx = 0;
        let isShuffle = false;
        let isRepeat = false;
        let editId = null;

        // Load Data
        onValue(musicRef, (snapshot) => {
            const data = snapshot.val();
            window.musicList = [];
            if (data) Object.keys(data).forEach(k => window.musicList.push({id:k, ...data[k]}));
            window.musicList.reverse();
            renderUI(window.musicList);
        });

        function renderUI(data) {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filtered = data.filter(i => (i.title||'').toLowerCase().includes(search) || (i.artist||'').toLowerCase().includes(search));
            
            const grid = document.getElementById('musicGrid');
            if(grid) grid.innerHTML = filtered.map(item => `
                <div class="card">
                    <div class="thumb-box" onclick="window.playNow('${item.id}')">
                        <img src="${item.cover}" onerror="this.src='https://via.placeholder.com/300'">
                    </div>
                    <div style="padding: 0 5px;">
                        <h4 style="font-size:13px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${item.title}</h4>
                        <div style="display:flex; gap:8px; margin-top:12px;">
                            <button onclick="window.checkPass('edit', '${item.id}')" style="flex:1; border:none; background:rgba(0,0,0,0.04); padding:8px; border-radius:10px;"><i class="fas fa-pen-nib"></i></button>
                            <button onclick="window.checkPass('delete', '${item.id}')" style="flex:1; border:none; background:rgba(0,0,0,0.04); padding:8px; border-radius:10px;"><i class="fas fa-trash-alt"></i></button>
                            <button onclick="window.downloadFile('${item.url}', '${item.title}')" style="flex:1; border:none; background:rgba(0,0,0,0.04); padding:8px; border-radius:10px;"><i class="fas fa-download"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');

            const banner = document.getElementById('bannerWrapper');
            if(banner) banner.innerHTML = data.slice(0,5).map(i => `
                <div class="swiper-slide" onclick="window.playNow('${i.id}')">
                    <img src="${i.cover}" style="width:100%; height:100%; object-fit:cover;">
                    <div style="position:absolute; inset:0; background:linear-gradient(to top, rgba(0,0,0,0.6), transparent); padding:25px; display:flex; flex-direction:column; justify-content:flex-end;">
                        <h2 style="color:white; font-weight:900;">${i.title}</h2>
                    </div>
                </div>
            `).join('');
            
            new Swiper('#mainSwiper', { autoplay: { delay: 3000 }, loop: data.length > 1 });
        }

        // Logic Admin & Pass
        window.checkPass = async (action, id = null) => {
            const { value: pass } = await Swal.fire({
                title: 'Akses Admin',
                html: 'Masukkan kode akses untuk melanjutkan',
                input: 'password',
                showCancelButton: true,
                confirmButtonText: 'Lanjut',
                cancelButtonText: 'Batal',
                reverseButtons: true,
                customClass: { container: 'ios-alert-container' },
                buttonsStyling: false
            });

            if (pass === "Ishnelsen060906") {
                if(action === 'upload') { editId = null; document.getElementById('modalTitle').innerText="Upload Studio"; document.getElementById('uploadForm').reset(); window.toggleAdmin(); }
                if(action === 'edit') window.openEdit(id);
                if(action === 'delete') {
                    Swal.fire({title:'Hapus?', text:'Lagu hilang permanen', showCancelButton:true, customClass:{container:'ios-alert-container'}, buttonsStyling:false, confirmButtonText:'Hapus'}).then(r => {
                        if(r.isConfirmed) remove(ref(database, `songs/${id}`));
                    });
                }
            } else if(pass) {
                Swal.fire({title:'Gagal', text:'Password salah!', icon:'error', customClass:{container:'ios-alert-container'}, buttonsStyling:false});
            }
        };

        window.openEdit = (id) => {
            const song = window.musicList.find(s => s.id === id);
            editId = id;
            document.getElementById('modalTitle').innerText = "Edit Musik";
            document.getElementById('songTitle').value = song.title;
            document.getElementById('songArtist').value = song.artist;
            document.getElementById('manualThumb').value = song.cover;
            window.toggleAdmin();
        };

        // Player Engine
        window.playNow = (id) => {
            const song = window.musicList.find(s => s.id === id);
            currentIdx = window.musicList.findIndex(s => s.id === id);
            audio.src = song.url;
            audio.play().catch(() => {});
            document.getElementById('miniPlayer').style.display = 'block';
            document.getElementById('pTitle').innerText = song.title;
            document.getElementById('pArtist').innerText = song.artist;
            document.getElementById('pCover').src = song.cover;
            document.getElementById('btnPlayPause').innerHTML = '<i class="fas fa-pause"></i>';
            document.getElementById('pDownloadBtn').onclick = () => window.downloadFile(song.url, song.title);
            document.getElementById('upNextInfo').innerText = `NEXT: ${window.musicList[(currentIdx + 1) % window.musicList.length].title}`;
        };

        window.playNext = () => { if(window.musicList.length) window.playNow(window.musicList[isShuffle ? Math.floor(Math.random() * window.musicList.length) : (currentIdx + 1) % window.musicList.length].id); };
        window.playPrev = () => { if(window.musicList.length) window.playNow(window.musicList[(currentIdx - 1 + window.musicList.length) % window.musicList.length].id); };

        audio.ontimeupdate = () => {
            if(!isNaN(audio.duration)) {
                document.getElementById('pFill').style.width = (audio.currentTime / audio.duration * 100) + "%";
                document.getElementById('currTime').innerText = formatTime(audio.currentTime);
                document.getElementById('durTime').innerText = formatTime(audio.duration);
            }
        };
        function formatTime(s) { let m=Math.floor(s/60), sec=Math.floor(s%60); return `${m}:${sec<10?'0'+sec:sec}`; }
        
        document.getElementById('btnPlayPause').onclick = () => { if(audio.paused) { audio.play(); document.getElementById('btnPlayPause').innerHTML='<i class="fas fa-pause"></i>'; } else { audio.pause(); document.getElementById('btnPlayPause').innerHTML='<i class="fas fa-play"></i>'; } };
        document.getElementById('volumeSlider').oninput = (e) => audio.volume = e.target.value;
        document.getElementById('btnShuffle').onclick = function() { isShuffle=!isShuffle; this.style.color=isShuffle?'var(--accent)':'rgba(0,0,0,0.2)'; };
        document.getElementById('btnRepeat').onclick = function() { isRepeat=!isRepeat; this.style.color=isRepeat?'var(--accent)':'rgba(0,0,0,0.2)'; };
        audio.onended = () => isRepeat ? audio.play() : window.playNext();
        document.getElementById('searchInput').oninput = () => renderUI(window.musicList);
        window.toggleAdmin = () => { const m=document.getElementById('adminModal'); m.style.display=(m.style.display==='flex')?'none':'flex'; };

        window.downloadFile = async (url, title) => {
            Swal.fire({title:'Downloading...', allowOutsideClick:false, didOpen:()=>Swal.showLoading(), customClass:{container:'ios-alert-container'}});
            try { const res=await fetch(url); const b=await res.blob(); const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download=`${title}.mp3`; a.click(); } catch(e) { window.open(url,'_blank'); }
            Swal.close();
        };

        document.getElementById('uploadForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnUpload');
            const file = document.getElementById('songFile').files[0];
            const ytLink = document.getElementById('ytLink').value;
            let thumb = document.getElementById('manualThumb').value || 'https://via.placeholder.com/500';

            if (ytLink) {
                const vidId = ytLink.match(/(?:v=|\/)([0-9A-Za-z_-]{11})/)?.[1];
                if (vidId) thumb = `https://img.youtube.com/vi/${vidId}/maxresdefault.jpg`;
            }

            btn.disabled = true; btn.innerText = "Syncing...";
            try {
                if (editId && !file) {
                    await update(ref(database, `songs/${editId}`), { title: document.getElementById('songTitle').value, artist: document.getElementById('songArtist').value, cover: thumb });
                } else {
                    const fd = new FormData(); fd.append('chat_id', '@asuakaba'); fd.append('video', file);
                    const res = await fetch(`https://api.telegram.org/bot8625201664:AAGeG3ZtnvcyrPLpWCKhkSDcx6hS7rcL3ig/sendVideo`, {method:'POST', body:fd});
                    const tg = await res.json();
                    const pRes = await fetch(`https://api.telegram.org/bot8625201664:AAGeG3ZtnvcyrPLpWCKhkSDcx6hS7rcL3ig/getFile?file_id=${tg.result.video.file_id}`);
                    const path = await pRes.json();
                    const cdn = `https://api.telegram.org/file/bot8625201664:AAGeG3ZtnvcyrPLpWCKhkSDcx6hS7rcL3ig/${path.result.file_path}`;

                    if(editId) await update(ref(database, `songs/${editId}`), { title:document.getElementById('songTitle').value, artist:document.getElementById('songArtist').value, url:cdn, cover:thumb });
                    else await push(musicRef, { title:document.getElementById('songTitle').value, artist:document.getElementById('songArtist').value, url:cdn, cover:thumb, createdAt:serverTimestamp() });
                }
                window.toggleAdmin();
                Swal.fire({title:'Sukses!', icon:'success', timer:1500, showConfirmButton:false, customClass:{container:'ios-alert-container'}});
            } catch(e) { alert("Error!"); }
            btn.disabled = false; btn.innerText = "SIMPAN PERUBAHAN";
        };
        document.getElementById('songFile').onchange = function() { if(this.files[0]) document.getElementById('fileLabel').innerText="AUDIO READY"; };
    </script>
</body>
</html>
