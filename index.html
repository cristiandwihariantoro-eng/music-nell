<!DOCTYPE html>
<html lang="id" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aura Music | Cinematic Streaming</title>
    <meta name="theme-color" content="#ffffff">
    <meta name="description" content="Premium music streaming experience powered by Audius.">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        glass: 'rgba(255, 255, 255, 0.4)',
                        glassDark: 'rgba(10, 10, 15, 0.6)',
                        brand: '#7c3aed', // Violet 600
                    },
                    animation: {
                        'spin-slow': 'spin 8s linear infinite',
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Swiper CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        /* Custom Styles & Glassmorphism Utilities */
        body {
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            background-color: #f8fafc;
            color: #0f172a;
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        .dark body {
            background-color: #020617;
            color: #f8fafc;
        }

        /* Dynamic Background Blur */
        #dynamic-bg {
            position: fixed;
            top: -10%; left: -10%; width: 120%; height: 120%;
            background-size: cover;
            background-position: center;
            filter: blur(100px) saturate(150%) brightness(0.9);
            opacity: 0.3;
            z-index: -2;
            transition: background-image 1.5s ease-in-out, opacity 1s;
        }
        
        .dark #dynamic-bg {
            opacity: 0.2;
            filter: blur(120px) saturate(200%) brightness(0.5);
        }

        /* Three.js Canvas Container */
        #visualizer-container {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1;
            pointer-events: none;
            opacity: 0.6;
            mix-blend-mode: screen;
        }
        .dark #visualizer-container { mix-blend-mode: screen; opacity: 0.8; }

        /* Glass Panels */
        .glass-panel {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05);
        }
        .dark .glass-panel {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(124, 58, 237, 0.3); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(124, 58, 237, 0.6); }

        /* Range Slider Styling (Progress Bar) */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
            height: 4px;
            border-radius: 2px;
            cursor: pointer;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 4px; background: rgba(124, 58, 237, 0.2); border-radius: 2px;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 12px; width: 12px;
            border-radius: 50%;
            background: #7c3aed;
            margin-top: -4px;
            box-shadow: 0 0 10px rgba(124, 58, 237, 0.8);
            transition: transform 0.1s;
        }
        input[type=range]:active::-webkit-slider-thumb { transform: scale(1.3); }

        /* Utilities */
        .text-gradient {
            background: linear-gradient(135deg, #7c3aed, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hover-card-img img { transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1); }
        .hover-card-img:hover img { transform: scale(1.1); }
        .play-overlay { transition: opacity 0.3s ease; }
        .hover-card-img:hover .play-overlay { opacity: 1; }
        
        /* Swiper Custom */
        .swiper-pagination-bullet-active { background: #7c3aed !important; }
        
        /* Hide scrollbar for layout */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="antialiased selection:bg-brand selection:text-white">

    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lazysizes/5.3.2/lazysizes.min.js" async=""></script>

    <script>
        /**
         * AURA MUSIC - Core Application Logic
         * Architecture: 
         * 1. App State
         * 2. Audius API Service
         * 3. Audio Player (Howler)
         * 4. UI Rendering & DOM manipulation
         * 5. Animations (GSAP & Anime.js)
         * 6. 3D Visualizer (Three.js)
         */

        const APP_NAME = 'Aura_Cinematic_Music';
        
        // --- 1. State Management ---
        const state = {
            queue: [],
            currentIndex: -1,
            isPlaying: false,
            howl: null,
            apiHost: null,
            volume: 0.8,
            isVisualizerActive: true,
            theme: localStorage.getItem('theme') || 'dark',
            searchTimeout: null
        };

        // --- 2. Audius API Service ---
        const API = {
            async getHost() {
                if (state.apiHost) return state.apiHost;
                try {
                    const res = await fetch('https://api.audius.co');
                    const data = await res.json();
                    state.apiHost = data.data[0];
                    return state.apiHost;
                } catch (e) {
                    console.error("Audius host error:", e);
                    return null; // Will trigger fallback data
                }
            },
            async fetchTrending() {
                const host = await this.getHost();
                if (!host) return this.getFallbackData();
                try {
                    const res = await fetch(`${host}/v1/tracks/trending?app_name=${APP_NAME}&limit=12`);
                    const json = await res.json();
                    return json.data;
                } catch (e) {
                    return this.getFallbackData();
                }
            },
            async searchTracks(query) {
                const host = await this.getHost();
                if (!host) return [];
                try {
                    const res = await fetch(`${host}/v1/tracks/search?query=${encodeURIComponent(query)}&app_name=${APP_NAME}&limit=12`);
                    const json = await res.json();
                    return json.data;
                } catch (e) {
                    return [];
                }
            },
            getStreamUrl(trackId) {
                if(!state.apiHost) return '';
                return `${state.apiHost}/v1/tracks/${trackId}/stream?app_name=${APP_NAME}`;
            },
            getArtworkUrl(track, size='480x480') {
                return track.artwork ? track.artwork[size] : `https://api.dicebear.com/7.x/shapes/svg?seed=${track.id}`;
            },
            // Fallback data if API is blocked by browser extensions/CORS
            getFallbackData() {
                return Array.from({length: 12}).map((_, i) => ({
                    id: `mock_${i}`,
                    title: `Cinematic Wave ${i+1}`,
                    user: { name: `Aura Artist ${i+1}` },
                    artwork: null,
                    duration: 180 + (i * 10),
                    isMock: true // identify mock
                }));
            }
        };

        // --- 3. Audio Player (Howler.js) ---
        const Player = {
            playTrack(index) {
                if(index < 0 || index >= state.queue.length) return;
                
                state.currentIndex = index;
                const track = state.queue[index];
                
                if (state.howl) {
                    state.howl.unload();
                }

                if (track.isMock) {
                    // Simulate playing a mock track
                    this.updateUI(track);
                    state.isPlaying = true;
                    UI.togglePlayIcon(true);
                    return;
                }

                const streamUrl = API.getStreamUrl(track.id);

                state.howl = new Howl({
                    src: [streamUrl],
                    html5: true, // Force HTML5 Audio to bypass CORS stream issues and support large files
                    volume: state.volume,
                    format: ['mp3', 'aac'],
                    onplay: () => {
                        state.isPlaying = true;
                        UI.togglePlayIcon(true);
                        requestAnimationFrame(Player.step);
                    },
                    onpause: () => {
                        state.isPlaying = false;
                        UI.togglePlayIcon(false);
                    },
                    onend: () => {
                        Player.next();
                    },
                    onloaderror: (id, err) => console.error("Howler Load Error:", err),
                    onplayerror: (id, err) => {
                        console.error("Howler Play Error:", err);
                        state.howl.once('unlock', () => { state.howl.play(); });
                    }
                });

                this.updateUI(track);
                state.howl.play();
                
                // Trigger animations
                Animations.onPlayTrigger(track);
            },
            togglePlay() {
                if(!state.howl && state.queue.length > 0 && !state.queue[0].isMock) {
                    this.playTrack(0);
                    return;
                }
                
                if (state.isPlaying) {
                    state.howl?.pause();
                    if(state.queue[state.currentIndex]?.isMock) state.isPlaying = false;
                } else {
                    state.howl?.play();
                    if(state.queue[state.currentIndex]?.isMock) state.isPlaying = true;
                }
                UI.togglePlayIcon(state.isPlaying);
            },
            next() {
                let nextIdx = state.currentIndex + 1;
                if(nextIdx >= state.queue.length) nextIdx = 0; // loop back
                this.playTrack(nextIdx);
            },
            prev() {
                let prevIdx = state.currentIndex - 1;
                if(prevIdx < 0) prevIdx = state.queue.length - 1;
                this.playTrack(prevIdx);
            },
            seek(percent) {
                if(state.howl && state.howl.playing()) {
                    const duration = state.howl.duration();
                    state.howl.seek(duration * percent);
                }
            },
            setVolume(val) {
                state.volume = val;
                if(state.howl) state.howl.volume(val);
            },
            step() {
                if (state.isPlaying && state.howl) {
                    const seek = state.howl.seek() || 0;
                    const duration = state.howl.duration() || 0;
                    UI.updateProgress(seek, duration);
                    requestAnimationFrame(Player.step);
                }
            },
            updateUI(track) {
                const coverUrl = API.getArtworkUrl(track);
                document.getElementById('player-title').textContent = track.title;
                document.getElementById('player-artist').textContent = track.user.name;
                document.getElementById('player-cover').src = coverUrl;
                document.getElementById('time-total').textContent = this.formatTime(track.duration);
                
                // Update dynamic background
                document.getElementById('dynamic-bg').style.backgroundImage = `url(${coverUrl})`;

                // Add to queue if not present (simple implementation)
                if(!state.queue.find(t => t.id === track.id)) {
                    state.queue.push(track);
                    state.currentIndex = state.queue.length - 1;
                }
            },
            formatTime(secs) {
                const minutes = Math.floor(secs / 60) || 0;
                const seconds = Math.floor(secs - minutes * 60) || 0;
                return minutes + ':' + (seconds < 10 ? '0' : '') + seconds;
            }
        };

        // --- 4. UI Rendering ---
        const UI = {
            async init() {
                this.setupTheme();
                this.bindEvents();
                Visualizer.init();
                
                // Load Initial Data
                const tracks = await API.fetchTrending();
                state.queue = [...tracks]; // Init queue with trending
                this.renderTrending(tracks);
                this.renderBanners(tracks.slice(0, 5));
                this.renderCurated();

                // GSAP Initial Reveal
                gsap.from(".glass-panel", { y: 50, opacity: 0, duration: 1, stagger: 0.1, ease: "power3.out" });
                gsap.from(".gsap-section", { y: 30, opacity: 0, duration: 0.8, stagger: 0.2, delay: 0.5, ease: "power2.out" });
            },
            
            setupTheme() {
                if (state.theme === 'dark') document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');

                const toggleBtn = () => {
                    document.documentElement.classList.toggle('dark');
                    state.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
                    localStorage.setItem('theme', state.theme);
                    Visualizer.updateThemeColors();
                };

                document.getElementById('theme-toggle').addEventListener('click', toggleBtn);
                document.getElementById('mobile-theme-toggle').addEventListener('click', toggleBtn);
            },

            bindEvents() {
                // Player Controls
                document.getElementById('btn-play').addEventListener('click', () => {
                    anime({ targets: '#btn-play', scale: [0.9, 1.1, 1], duration: 400, easing: 'easeOutElastic(1, .8)' });
                    Player.togglePlay();
                });
                document.getElementById('btn-next').addEventListener('click', () => Player.next());
                document.getElementById('btn-prev').addEventListener('click', () => Player.prev());
                
                // Progress Bar Seek
                const progContainer = document.getElementById('progress-container');
                progContainer.addEventListener('click', (e) => {
                    const rect = progContainer.getBoundingClientRect();
                    const percent = (e.clientX - rect.left) / rect.width;
                    Player.seek(percent);
                    // Update visual instantly
                    document.getElementById('progress-bar').style.width = `${percent * 100}%`;
                });

                // Volume
                document.getElementById('volume-slider').addEventListener('input', (e) => {
                    Player.setVolume(e.target.value / 100);
                });

                // Search
                const searchInput = document.getElementById('search-input');
                searchInput.addEventListener('input', (e) => {
                    clearTimeout(state.searchTimeout);
                    const query = e.target.value.trim();
                    if(query.length > 2) {
                        state.searchTimeout = setTimeout(() => this.performSearch(query), 500);
                    } else if(query.length === 0) {
                        document.getElementById('search-view').classList.add('hidden');
                        document.getElementById('home-view').classList.remove('hidden');
                    }
                });

                // Visualizer Toggle
                document.getElementById('btn-visualizer').addEventListener('click', () => {
                    state.isVisualizerActive = !state.isVisualizerActive;
                    document.getElementById('visualizer-container').style.opacity = state.isVisualizerActive ? '0.6' : '0';
                    document.getElementById('btn-visualizer').classList.toggle('text-brand');
                });

                // Hover animations for buttons
                document.querySelectorAll('.anime-hover').forEach(el => {
                    el.addEventListener('mouseenter', () => anime({ targets: el, translateY: -2, duration: 200, easing: 'easeOutQuad' }));
                    el.addEventListener('mouseleave', () => anime({ targets: el, translateY: 0, duration: 200, easing: 'easeOutQuad' }));
                });
            },

            createTrackCard(track, index) {
                const coverUrl = API.getArtworkUrl(track);
                const isMock = track.isMock ? `<span class="absolute top-2 right-2 text-[10px] bg-black/50 text-white px-2 py-1 rounded backdrop-blur-sm">Mock</span>` : '';
                
                const div = document.createElement('div');
                div.className = "group relative rounded-2xl overflow-hidden glass-panel p-3 cursor-pointer hover:-translate-y-2 transition-transform duration-300";
                div.innerHTML = `
                    <div class="relative w-full aspect-square rounded-xl overflow-hidden hover-card-img mb-3">
                        <img data-src="${coverUrl}" class="lazyload w-full h-full object-cover" alt="Cover">
                        ${isMock}
                        <div class="play-overlay absolute inset-0 bg-black/40 opacity-0 flex items-center justify-center">
                            <button class="w-12 h-12 rounded-full bg-brand text-white flex items-center justify-center shadow-lg hover:scale-110 transition-transform">
                                <i class="ph-fill ph-play text-xl ml-1"></i>
                            </button>
                        </div>
                    </div>
                    <h3 class="font-bold text-sm truncate text-gray-900 dark:text-white">${track.title}</h3>
                    <p class="text-xs text-gray-500 dark:text-gray-400 truncate">${track.user.name}</p>
                `;
                div.addEventListener('click', () => {
                    // Find track in queue or add it
                    let qIdx = state.queue.findIndex(t => t.id === track.id);
                    if(qIdx === -1) {
                        state.queue.push(track);
                        qIdx = state.queue.length - 1;
                    }
                    Player.playTrack(qIdx);
                });
                return div;
            },

            renderTrending(tracks) {
                const grid = document.getElementById('trending-grid');
                grid.innerHTML = '';
                tracks.forEach((track, i) => {
                    grid.appendChild(this.createTrackCard(track, i));
                });
            },

            renderBanners(tracks) {
                const wrapper = document.getElementById('banner-wrapper');
                wrapper.innerHTML = '';
                tracks.forEach(track => {
                    const div = document.createElement('div');
                    div.className = "swiper-slide relative h-64 md:h-80 rounded-3xl overflow-hidden cursor-pointer group";
                    div.innerHTML = `
                        <img data-src="${API.getArtworkUrl(track, '1000x1000')}" class="lazyload w-full h-full object-cover transition-transform duration-1000 group-hover:scale-105" alt="Banner">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent flex flex-col justify-end p-8">
                            <span class="inline-block px-3 py-1 bg-brand text-white text-xs font-bold rounded-full w-max mb-3 backdrop-blur-md">Featured</span>
                            <h2 class="text-3xl md:text-5xl font-extrabold text-white mb-2 drop-shadow-lg truncate">${track.title}</h2>
                            <p class="text-lg text-gray-300 font-medium">${track.user.name}</p>
                        </div>
                    `;
                    div.addEventListener('click', () => {
                        let qIdx = state.queue.findIndex(t => t.id === track.id);
                        if(qIdx === -1) { state.queue.push(track); qIdx = state.queue.length - 1; }
                        Player.playTrack(qIdx);
                    });
                    wrapper.appendChild(div);
                });

                new Swiper('.bannerSwiper', {
                    loop: true,
                    effect: 'fade',
                    fadeEffect: { crossFade: true },
                    autoplay: { delay: 5000, disableOnInteraction: false },
                    pagination: { el: '.swiper-pagination', clickable: true },
                    navigation: { nextEl: '.swiper-button-next', prevEl: '.swiper-button-prev' },
                });
            },

            renderCurated() {
                const wrapper = document.getElementById('curated-wrapper');
                const mockPlaylists = ['Chill Vibes', 'Workout Mix', 'Deep Focus', 'Midnight Drive', 'Indie Discover'];
                mockPlaylists.forEach((name, i) => {
                    const div = document.createElement('div');
                    div.className = "swiper-slide w-48";
                    div.innerHTML = `
                        <div class="relative w-48 h-48 rounded-2xl overflow-hidden group cursor-pointer shadow-lg">
                            <img data-src="https://api.dicebear.com/7.x/shapes/svg?seed=${name}" class="lazyload w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                            <div class="absolute inset-0 bg-gradient-to-t from-black/70 to-transparent flex items-end p-4">
                                <h3 class="text-white font-bold">${name}</h3>
                            </div>
                        </div>
                    `;
                    wrapper.appendChild(div);
                });

                new Swiper('.playlistSwiper', {
                    slidesPerView: 'auto',
                    spaceBetween: 20,
                    freeMode: true,
                });
            },

            async performSearch(query) {
                document.getElementById('home-view').classList.add('hidden');
                document.getElementById('search-view').classList.remove('hidden');
                document.getElementById('search-loading').classList.remove('hidden');
                const grid = document.getElementById('search-grid');
                grid.innerHTML = '';

                const results = await API.searchTracks(query);
                document.getElementById('search-loading').classList.add('hidden');
                
                if(results.length === 0) {
                    grid.innerHTML = `<div class="col-span-full text-center text-gray-500 py-10">No tracks found in the void.</div>`;
                    return;
                }

                results.forEach((track, i) => {
                    grid.appendChild(this.createTrackCard(track, i));
                });
                
                // Animate entrance
                gsap.from("#search-grid > div", { y: 20, opacity: 0, duration: 0.5, stagger: 0.05 });
            },

            updateProgress(seek, duration) {
                if(duration === 0) return;
                const percent = (seek / duration) * 100;
                document.getElementById('progress-bar').style.width = `${percent}%`;
                document.getElementById('progress-bar-mini').style.width = `${percent}%`;
                document.getElementById('time-current').textContent = Player.formatTime(seek);
            },

            togglePlayIcon(isPlaying) {
                const icon = document.getElementById('play-icon');
                if (isPlaying) {
                    icon.classList.remove('ph-play');
                    icon.classList.add('ph-pause');
                    // Add pulse to cover
                    document.getElementById('player-cover').classList.add('animate-spin-slow');
                } else {
                    icon.classList.remove('ph-pause');
                    icon.classList.add('ph-play');
                    document.getElementById('player-cover').classList.remove('animate-spin-slow');
                }
            }
        };

        // --- 5. Animations & Micro-interactions ---
        const Animations = {
            onPlayTrigger(track) {
                // Pop the album art
                anime({
                    targets: '#player-cover',
                    scale: [0.8, 1],
                    duration: 600,
                    easing: 'easeOutElastic(1, .8)'
                });
                
                // Change Theme color dynamically based on cover art (Simulated with random hue for cinematic effect)
                const randomHue = Math.floor(Math.random() * 360);
                document.documentElement.style.setProperty('--brand-hue', randomHue);
                // (In a real scenario, use canvas to extract dominant color. Kept simple for performance)
            }
        };

        // --- 6. 3D Visualizer (Three.js) ---
        // A cinematic particle field that reacts gently to state.isPlaying
        const Visualizer = {
            scene: null, camera: null, renderer: null, particles: null,
            init() {
                const container = document.getElementById('visualizer-container');
                this.scene = new THREE.Scene();
                this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                
                this.renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                container.appendChild(this.renderer.domElement);

                // Create particles
                const geometry = new THREE.BufferGeometry();
                const count = 1500;
                const positions = new Float32Array(count * 3);
                const colors = new Float32Array(count * 3);
                
                const colorObj = new THREE.Color();
                
                for(let i = 0; i < count * 3; i+=3) {
                    positions[i] = (Math.random() - 0.5) * 20;
                    positions[i+1] = (Math.random() - 0.5) * 20;
                    positions[i+2] = (Math.random() - 0.5) * 20;
                    
                    // Base color purple/pink mix
                    colorObj.setHSL(0.7 + Math.random() * 0.2, 0.8, 0.5);
                    colors[i] = colorObj.r;
                    colors[i+1] = colorObj.g;
                    colors[i+2] = colorObj.b;
                }

                geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

                const material = new THREE.PointsMaterial({
                    size: 0.05,
                    vertexColors: true,
                    transparent: true,
                    opacity: 0.8,
                    blending: THREE.AdditiveBlending
                });

                this.particles = new THREE.Points(geometry, material);
                this.scene.add(this.particles);

                this.camera.position.z = 5;

                window.addEventListener('resize', () => {
                    this.camera.aspect = window.innerWidth / window.innerHeight;
                    this.camera.updateProjectionMatrix();
                    this.renderer.setSize(window.innerWidth, window.innerHeight);
                });

                this.animate();
            },
            updateThemeColors() {
                // Subtle adjustment based on theme
                if(this.particles) {
                    this.particles.material.opacity = state.theme === 'dark' ? 0.8 : 0.4;
                    this.particles.material.blending = state.theme === 'dark' ? THREE.AdditiveBlending : THREE.NormalBlending;
                }
            },
            animate() {
                requestAnimationFrame(() => this.animate());

                if (!state.isVisualizerActive) return;

                // Base rotation
                this.particles.rotation.y += 0.001;
                this.particles.rotation.x += 0.0005;

                // Audio reactive simulation (since actual WebAudio API data requires CORS setup that Audius might block depending on endpoint)
                if (state.isPlaying) {
                    const time = Date.now() * 0.001;
                    // Simulate bass pulse
                    const pulse = 1 + Math.sin(time * 5) * 0.05; 
                    this.particles.scale.set(pulse, pulse, pulse);
                    this.particles.rotation.y += 0.002; // Spin faster
                } else {
                    // Return to normal scale smoothly
                    this.particles.scale.lerp(new THREE.Vector3(1,1,1), 0.05);
                }

                this.renderer.render(this.scene, this.camera);
            }
        };

        // --- Initialize Application ---
        document.addEventListener('DOMContentLoaded', () => {
            UI.init();
        });

    </script>
</body>
</html>
